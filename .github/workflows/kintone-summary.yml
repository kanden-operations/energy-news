name: kintone daily summary

on:
  schedule:
    # 毎日 20:10 JST = 11:10 UTC
    - cron: '10 11 * * *'
  workflow_dispatch: {} # 手動実行も可能に

permissions:
  contents: write # commit/push するため

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/kintone-summary/package-lock.json

      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install deps
        working-directory: scripts/kintone-summary
        run: npm ci

      - name: Generate summary images
        working-directory: scripts/kintone-summary
        env:
          KINTONE_SUBDOMAIN: ${{ secrets.KINTONE_SUBDOMAIN }}
          KINTONE_TOKEN_A: ${{ secrets.KINTONE_TOKEN_A }}
          KINTONE_TOKEN_B: ${{ secrets.KINTONE_TOKEN_B }}
          KINTONE_TOKEN_C: ${{ secrets.KINTONE_TOKEN_C }}
        run: node run.js

      - name: Commit & push images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add summary/
          git diff --cached --quiet || git commit -m "chore(summary): update $(date -u +%Y-%m-%d)"
          git push
